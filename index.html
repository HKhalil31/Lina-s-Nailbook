<meta charset="utf-8">
<title>NailBook — Client Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#93355C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NailBook">
<style>
:root{
  --ground:#FBF8F7; --surface:#FFFFFF; --ink:#2A2126; --muted:#7C6B75;
  --accent:#93355C; --accent-ink:#FFFFFF; --accent-soft:#F5E3EC; --line:#EADCE2;
  --good:#2F7A4D; --good-soft:#E2F0E7; --warn:#A9701F; --warn-soft:#F6ECDA; --bad:#B23F38; --bad-soft:#F6E3E1;
  --shadow:0 1px 3px rgba(42,33,38,.08),0 4px 14px rgba(42,33,38,.06);
  --r:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --ground:#191216; --surface:#241A20; --ink:#F2E8ED; --muted:#A78F9C;
    --accent:#D687AC; --accent-ink:#2A1220; --accent-soft:#3A2530; --line:#3A2B33;
    --good:#7FC79A; --good-soft:#22352A; --warn:#DBA95C; --warn-soft:#3A2F1D; --bad:#E08A83; --bad-soft:#402523;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.3);
  }
}
:root[data-theme="light"]{
  --ground:#FBF8F7; --surface:#FFFFFF; --ink:#2A2126; --muted:#7C6B75;
  --accent:#93355C; --accent-ink:#FFFFFF; --accent-soft:#F5E3EC; --line:#EADCE2;
  --good:#2F7A4D; --good-soft:#E2F0E7; --warn:#A9701F; --warn-soft:#F6ECDA; --bad:#B23F38; --bad-soft:#F6E3E1;
  --shadow:0 1px 3px rgba(42,33,38,.08),0 4px 14px rgba(42,33,38,.06);
}
:root[data-theme="dark"]{
  --ground:#191216; --surface:#241A20; --ink:#F2E8ED; --muted:#A78F9C;
  --accent:#D687AC; --accent-ink:#2A1220; --accent-soft:#3A2530; --line:#3A2B33;
  --good:#7FC79A; --good-soft:#22352A; --warn:#DBA95C; --warn-soft:#3A2F1D; --bad:#E08A83; --bad-soft:#402523;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.3);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--ground); color:var(--ink);
  font:16px/1.45 ui-rounded,"SF Pro Rounded",system-ui,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,select,textarea{
  font:inherit;color:var(--ink);background:var(--surface);
  border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;width:100%;
}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
textarea{resize:vertical;min-height:64px}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 5px;letter-spacing:.02em}
#app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
main{flex:1;padding:0 16px 90px}
.topbar{
  position:sticky;top:0;z-index:5;background:var(--ground);
  padding:calc(14px + env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;gap:10px;
}
.topbar h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0;flex:1;text-wrap:balance}
.iconbtn{
  width:40px;height:40px;border-radius:12px;background:var(--surface);border:1.5px solid var(--line);
  display:inline-flex;align-items:center;justify-content:center;font-size:18px;flex:none;box-shadow:var(--shadow);
}
.sugg{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.suggitem{text-align:left;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:9px 12px;font-weight:700;font-size:14px}
.suggitem span{color:var(--muted);font-weight:400;font-size:12px}
a.wa{width:38px;height:38px;border-radius:50%;background:var(--good-soft);border:0;
  display:inline-flex;align-items:center;justify-content:center;font-size:17px;flex:none;
  text-decoration:none;align-self:center}
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:6;
  background:var(--surface);border-top:1.5px solid var(--line);
  padding:6px 8px calc(8px + env(safe-area-inset-bottom));
}
.tabbar .row{max-width:520px;margin:0 auto;display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border-radius:12px;color:var(--muted);font-size:11px;font-weight:600}
.tab .ico{font-size:20px;line-height:1}
.tab.on{color:var(--accent);background:var(--accent-soft)}
.card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.card.tap{cursor:pointer}
.card.tap:active{transform:scale(.99)}
.appt{display:flex;gap:12px;align-items:flex-start}
.appt .time{font-variant-numeric:tabular-nums;font-weight:800;font-size:15px;min-width:62px;padding-top:1px}
.appt .who{flex:1;min-width:0}
.appt .name{font-weight:700;font-size:16px}
.appt .svc{color:var(--muted);font-size:14px;margin-top:1px}
.appt .extra{font-size:13px;color:var(--muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 10px}
.appt.cancelled .name,.appt.cancelled .svc{text-decoration:line-through;opacity:.55}
.chev{color:var(--muted);align-self:center}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.03em;border-radius:999px;padding:2px 8px;vertical-align:2px}
.b-new{background:var(--accent-soft);color:var(--accent)}
.b-ok{background:var(--good-soft);color:var(--good)}
.b-warn{background:var(--warn-soft);color:var(--warn)}
.b-bad{background:var(--bad-soft);color:var(--bad)}
.b-line{border:1.5px solid var(--line);color:var(--muted)}
.days{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day{
  flex:none;min-width:58px;text-align:center;padding:8px 10px;border-radius:12px;
  background:var(--surface);border:1.5px solid var(--line);
}
.day .dw{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.day .dn{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums}
.day .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin:3px auto 0;visibility:hidden}
.day.has .dot{visibility:visible}
.day.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.day.on .dw{color:var(--accent-ink);opacity:.8}
.day.on .dot{background:var(--accent-ink)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:var(--accent-ink);font-weight:700;
  border-radius:12px;padding:12px 18px;box-shadow:var(--shadow);
}
.btn.sec{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.btn.danger{background:var(--bad-soft);color:var(--bad)}
.btn.sm{padding:8px 12px;font-size:14px;border-radius:10px}
.btn.wide{width:100%}
.btnrow{display:flex;gap:8px;margin:12px 0}
.btnrow .btn{flex:1}
.empty{text-align:center;color:var(--muted);padding:44px 20px}
.empty .big{font-size:40px;margin-bottom:8px}
.sect{font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:22px 0 10px}
.ov{
  position:fixed;inset:0;z-index:20;background:var(--ground);display:none;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.ov.open{display:block}
.ov .inner{max-width:520px;margin:0 auto;padding:0 16px 40px}
.ovbar{
  position:sticky;top:0;z-index:2;background:var(--ground);
  display:flex;align-items:center;gap:10px;
  padding:calc(14px + env(safe-area-inset-top)) 0 10px;
}
.ovbar h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clientrow{display:flex;align-items:center;gap:12px}
.avatar{
  width:44px;height:44px;border-radius:50%;flex:none;
  background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;
}
.clientrow .meta{color:var(--muted);font-size:13px;margin-top:2px;display:flex;flex-wrap:wrap;gap:2px 10px}
.kv{display:flex;gap:10px}
.kv>*{flex:1}
.switch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1.5px solid var(--line)}
.switch:last-child{border-bottom:0}
.switch .lab{font-weight:600;font-size:15px}
.switch .sub{color:var(--muted);font-size:13px;margin-top:1px}
.sw{position:relative;width:48px;height:28px;flex:none;border-radius:999px;background:var(--line);transition:background .15s}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .15s}
.sw.on{background:var(--accent)}
.sw.on::after{left:23px}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.thumb{position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;border:1.5px solid var(--line);background:var(--accent-soft)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .x{
  position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;font-size:12px;line-height:20px;text-align:center;
}
.addphoto{
  width:64px;height:64px;border-radius:10px;border:1.5px dashed var(--line);
  display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--muted);
}
.visit .vhead{display:flex;align-items:baseline;gap:10px}
.visit .vdate{font-weight:800;font-variant-numeric:tabular-nums;font-size:14px}
.visit .vprice{margin-left:auto;font-weight:800;font-variant-numeric:tabular-nums}
.visit .vsvc{margin-top:2px}
.visit .vnote{color:var(--muted);font-size:14px;margin-top:4px;white-space:pre-wrap}
.note{background:var(--accent-soft);border:0;border-radius:var(--r);padding:12px 14px;font-size:14px;margin-bottom:10px}
.note b{color:var(--accent)}
.hint{color:var(--muted);font-size:13px;margin-top:6px}
.searchwrap{position:sticky;top:calc(64px + env(safe-area-inset-top));z-index:4;background:var(--ground);padding-bottom:10px}
table.map{width:100%;border-collapse:collapse;font-size:14px}
table.map td{padding:6px 8px 6px 0;vertical-align:middle}
table.map td:first-child{font-weight:600;white-space:nowrap;width:1%}
#toast{
  position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--ground);padding:10px 18px;border-radius:999px;
  font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:all .2s;z-index:99;
  max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#photoview{position:fixed;inset:0;z-index:30;background:rgba(10,5,8,.92);display:none;align-items:center;justify-content:center}
#photoview.open{display:flex}
#photoview img{max-width:96vw;max-height:88vh;border-radius:8px}
#photoview .x{position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;color:#fff;font-size:26px;width:44px;height:44px}
pre.paste-eg{background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:10px;font-size:12px;overflow-x:auto;color:var(--muted)}
/* week calendar */
.weekcal-panel{display:none}
@media(min-width:960px){
  #app.wide{max-width:1010px}
  #app.wide .today-wrap{display:grid;grid-template-columns:minmax(0,1fr) 450px;gap:22px;align-items:start}
  .weekcal-panel{display:block;position:sticky;top:70px;max-height:calc(100dvh - 90px);overflow-y:auto;border-radius:var(--r)}
  .cal-btn{display:none!important}
}
.wc{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:12px}
.wc-title{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 8px 2px}
.wc-week{margin-bottom:14px}
.wc-wklab{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:2px 0 5px 2px}
.wc-head,.wc-body{display:grid;grid-template-columns:30px repeat(7,1fr);gap:3px}
.wc-head{margin-bottom:4px}
.wc-day{text-align:center;font-size:10px;font-weight:700;color:var(--muted);border-radius:8px;padding:3px 0;line-height:1.25}
.wc-day b{font-size:13px;font-variant-numeric:tabular-nums}
.wc-day.today{color:var(--accent)}
.wc-day.sel{background:var(--accent-soft);color:var(--accent)}
.wc-gut div{font-size:9px;color:var(--muted);text-align:right;padding-right:4px;font-variant-numeric:tabular-nums}
.wc-col{position:relative;border-radius:8px;background:var(--ground);cursor:pointer;
  background-image:repeating-linear-gradient(to bottom,var(--line) 0,var(--line) 1px,transparent 1px,transparent 40px)}
.wc-blk{position:absolute;left:4%;right:4%;border-radius:6px;overflow:hidden;
  background:var(--accent);color:var(--accent-ink);font-size:10.5px;font-weight:700;
  padding:2px 4px;white-space:normal;cursor:pointer;line-height:1.2;
  box-shadow:0 1px 2px rgba(0,0,0,.18);text-align:left;word-break:break-word}
.wc-blk.unconf{background:var(--warn-soft);color:var(--warn);box-shadow:inset 0 0 0 1.5px var(--warn)}
.wc-blk.cxl{background:var(--line);color:var(--muted);text-decoration:line-through;box-shadow:none}
.wc-legend{display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.wc-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
.wc-scroll{overflow-x:auto}
.wc-scroll .wc{min-width:640px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center;box-shadow:var(--shadow)}
.stat .n{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums}
.stat .l{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chip{border:1.5px solid var(--line);background:var(--surface);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700}
.chip.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>

<div id="app">
  <div id="views"></div>
</div>
<nav class="tabbar"><div class="row" id="tabs"></div></nav>

<div class="ov" id="ov-client"><div class="inner" id="ov-client-in"></div></div>
<div class="ov" id="ov-visit"><div class="inner" id="ov-visit-in"></div></div>
<div class="ov" id="ov-new"><div class="inner">
  <div class="ovbar"><button class="iconbtn" data-act="nc-cancel">‹</button><h2>New client</h2></div>
  <div class="card">
    <label>Name</label><input id="nc-name" autocomplete="off" placeholder="her full name">
    <label>Phone <span style="font-weight:400">(optional — enables WhatsApp)</span></label>
    <input id="nc-phone" type="tel" inputmode="tel" placeholder="03 …">
    <div class="btnrow" style="margin-bottom:0">
      <button class="btn" data-act="nc-create">＋ Create client</button>
      <button class="btn sec" data-act="nc-cancel">Cancel</button></div>
  </div></div></div>
<div class="ov" id="ov-cal"><div class="inner" id="ov-cal-in"></div></div>
<div class="ov" id="ov-appt"><div class="inner" id="ov-appt-in"></div></div>
<div class="ov" id="ov-import"><div class="inner" id="ov-import-in"></div></div>
<div class="ov" id="ov-map"><div class="inner" id="ov-map-in"></div></div>
<div id="photoview"><button class="x" data-act="pv-close">✕</button><img id="pv-img" alt="nail photo"></div>
<div id="askbox" style="position:fixed;inset:0;z-index:28;display:none;align-items:center;justify-content:center;background:rgba(20,10,16,.5);padding:20px">
  <div class="card" style="max-width:340px;width:100%;margin:0">
    <div id="ask-msg" style="font-weight:600;line-height:1.4;margin-bottom:14px"></div>
    <div class="btnrow" style="margin:0"><button class="btn" data-act="ask-yes">Yes</button>
    <button class="btn sec" data-act="ask-no">No</button></div>
  </div></div>
<div id="toast"></div>

<script>
"use strict";
/* ---------------- utils ---------------- */
const $=(s,r)=>(r||document).querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const pad=n=>String(n).padStart(2,"0");
const isoOf=(y,m,d)=>`${y}-${pad(m)}-${pad(d)}`;
const todayISO=()=>{const t=new Date();return isoOf(t.getFullYear(),t.getMonth()+1,t.getDate());};
const addDaysISO=(iso,n)=>{const d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+n);return isoOf(d.getFullYear(),d.getMonth()+1,d.getDate());};
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(iso){if(!iso)return"";const d=new Date(iso+"T12:00:00");if(isNaN(d))return iso;
  const t=todayISO();if(iso===t)return"Today";if(iso===addDaysISO(t,1))return"Tomorrow";if(iso===addDaysISO(t,-1))return"Yesterday";
  return`${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}${d.getFullYear()!==new Date().getFullYear()?" "+d.getFullYear():""}`;}
function nameKey(s){return String(s||"").toLowerCase().normalize("NFKD").replace(/[̀-ͯ]/g,"")
  .replace(/[^a-z0-9؀-ۿ]+/g," ").trim();}
function initials(n){const p=String(n||"?").trim().split(/\s+/);return((p[0]||"")[0]||"?").toUpperCase()+((p[1]||"")[0]||"").toUpperCase();}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2200);}
function askConfirm(msg,yes){S._askYes=yes;$("#ask-msg").textContent=msg;$("#askbox").style.display="flex";}
function fmtMoney(n){if(n==null||n==="")return"";const c=SET.currency||"";return(+n).toLocaleString(undefined,{maximumFractionDigits:2})+(c?" "+c:"");}

function parseDateStr(s,dayFirst){s=String(s??"").trim();if(!s)return null;
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return isoOf(+m[1],+m[2],+m[3]);
  m=s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})\b/);
  if(m){let a=+m[1],b=+m[2],y=+m[3];if(y<100)y+=2000;let d,mo;
    if(a>12){d=a;mo=b}else if(b>12){mo=a;d=b}else if(dayFirst){d=a;mo=b}else{mo=a;d=b}
    if(mo>=1&&mo<=12&&d>=1&&d<=31)return isoOf(y,mo,d);return null;}
  const t=new Date(s);if(!isNaN(t)&&t.getFullYear()>2000)return isoOf(t.getFullYear(),t.getMonth()+1,t.getDate());
  return null;}
function parseTime(s){s=String(s??"").trim();if(!s)return{disp:"",sort:9999};
  const m=s.match(/(\d{1,2})(?:[:.](\d{2}))?\s*(a\.?m\.?|p\.?m\.?|ص|م)?/i);
  if(!m)return{disp:s,sort:9998};
  let h=+m[1],mi=+(m[2]||0);const ap=(m[3]||"").toLowerCase();
  if((/^p/.test(ap)||ap==="م")&&h<12)h+=12;
  if((/^a/.test(ap)||ap==="ص")&&h===12)h=0;
  let sort=h*60+mi;
  if(!ap&&h>=1&&h<=7)sort=(h+12)*60+mi; /* bare 1–7 assumed afternoon for ordering */
  return{disp:`${h%12===0?12:h%12}:${pad(mi)} ${(sort>=720?"PM":"AM")}`,sort};}

function parseDSV(text){ /* CSV or TSV, quote-aware */
  const sep=text.slice(0,2000).includes("\t")?"\t":",";
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++}else q=false}else cur+=c;}
    else if(c==='"')q=true;
    else if(c===sep){row.push(cur);cur=""}
    else if(c==="\n"||c==="\r"){if(c==="\r"&&text[i+1]==="\n")i++;row.push(cur);cur="";rows.push(row);row=[];}
    else cur+=c;}
  if(cur!==""||row.length)row.push(cur),rows.push(row);
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));}

function serviceItems(){return(SET.servicesTxt||"").split("\n").map(s=>s.trim()).filter(Boolean).map(l=>{
  if(l.endsWith(":"))return{group:l.slice(0,-1)};
  const m=l.match(/^(.+?)\s*=\s*([\d.,]+)\s*$/);

function serviceNames(){return serviceItems().filter(i=>i.name).map(i=>i.name);}

  return it&&it.price!=null&&!isNaN(it.price)?it.price:null;}

    else h+=`<option value="${esc(it.name)}" ${it.name===sel?"selected":""}>${esc(it.name)}</option>`;}
  if(open)h+="</optgroup>";return h;}
function splitService(s){s=String(s||"").trim();if(!s)return{sel:"",custom:""};
  const opts=serviceNames();
  if(opts.includes(s))return{sel:s,custom:""};
  let best="";for(const l of opts)if(s.startsWith(l+" + ")&&l.length>best.length)best=l;
  if(best)return{sel:best,custom:s.slice(best.length+3)};
  return{sel:"",custom:s};}
function paidAmount(v){if(v.price===""||v.price==null)return null;
  return Math.round((+v.price)*(1-(+v.discountPct||0)/100)*100)/100;}
function receiptText(v,c){
  const d=new Date(v.date+"T12:00:00");
  const abs=isNaN(d)?v.date:`${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`;
  const lines=[`🧾 ${SET.salonName||"Receipt"}`,`${c.name} — ${abs}`,""];

      `Discount ${v.discountPct}%: −${fmtMoney(Math.round(((+v.price)-paid)*100)/100)}`,
      `Total paid: ${fmtMoney(paid)}`);}
    else lines.push(`Total paid: ${fmtMoney(paid)}`);}
  lines.push("","Thank you! See you next time 💅");
  return lines.join("\n");}

/* ---------------- indexedDB ---------------- */
let _db=null;
function db(){return new Promise((res,rej)=>{if(_db)return res(_db);
  const q=indexedDB.open("nailbook",2);
  q.onupgradeneeded=e=>{const d=e.target.result;
    for(const s of["clients","visits","photos","appts","log"])if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});};
  q.onsuccess=()=>{_db=q.result;res(_db)};q.onerror=()=>rej(q.error);});}
async function dbPut(st,v){const d=await db();return new Promise((res,rej)=>{const t=d.transaction(st,"readwrite");t.objectStore(st).put(v);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function dbDel(st,k){const d=await db();return new Promise((res,rej)=>{const t=d.transaction(st,"readwrite");t.objectStore(st).delete(k);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function dbClearStore(st){const d=await db();return new Promise((res,rej)=>{const t=d.transaction(st,"readwrite");t.objectStore(st).clear();t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function dbAll(st){const d=await db();return new Promise((res,rej)=>{const r=d.transaction(st).objectStore(st).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
async function dbGet(st,k){const d=await db();return new Promise((res,rej)=>{const r=d.transaction(st).objectStore(st).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}

/* ---------------- change log & undo ---------------- */
async function logAdd(label,undo){
  const e={id:uid(),ts:Date.now(),label,undo};
  S.log.unshift(e);
  while(S.log.length>3){const old=S.log.pop();await dbDel("log",old.id);}
  await dbPut("log",e);}
function logTime(ts){const d=new Date(ts);
  return`${fmtDate(isoOf(d.getFullYear(),d.getMonth()+1,d.getDate()))} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
async function doUndo(id){
  const e=S.log.find(x=>x.id===id);if(!e)return;const u=e.undo;
  try{
    switch(u.kind){
      case"client-restore":await dbPut("clients",u.client);break;
      case"client-delete":{
        for(const v of S.visits.filter(v=>v.clientId===u.id)){
          for(const p of v.photoIds||[])await dbDel("photos",p);await dbDel("visits",v.id);}
        await dbDel("clients",u.id);break;}
      case"client-full-restore":{await dbPut("clients",u.client);
        for(const v of u.visits||[])await dbPut("visits",v);
        for(const p of u.photos||[])await dbPut("photos",p);break;}
      case"visit-restore":await dbPut("visits",u.visit);break;
      case"visit-full-restore":{await dbPut("visits",u.visit);
        for(const p of u.photos||[])await dbPut("photos",p);break;}
      case"visit-delete":{for(const p of u.photoIds||[])await dbDel("photos",p);
        await dbDel("visits",u.id);
        if(u.apptId)await dbDel("appts",u.apptId);
        if(u.closeAppt){const ap=await dbGet("appts",u.closeAppt.id);
          if(ap){ap.status=u.closeAppt.prevStatus;ap.src=u.closeAppt.prevSrc;await dbPut("appts",ap);}}
        break;}
      case"appt-restore":{await dbPut("appts",u.appt);
        if(u.untomb){SET.hiddenAppts=(SET.hiddenAppts||[]).filter(h=>h!==u.untomb);saveSet();}break;}
      case"appt-delete":await dbDel("appts",u.id);break;
      case"appts-replace":{await dbClearStore("appts");
        for(const a of u.appts||[])await dbPut("appts",a);break;}
      default:toast("This change can't be undone");return;
    }
    await dbDel("log",e.id);
    await loadAll();
    if(S.openClientId)renderClient();
    render();toast("Undone ✓");
  }catch(err){toast("Couldn't undo that");}}
function clientByKey(key){if(!key)return null;
  let c=S.clients.find(c=>c.key===key);if(c)return c;
  const cands=S.clients.filter(c=>c.key&&(c.key.startsWith(key+" ")||key.startsWith(c.key+" ")));
  return cands.length===1?cands[0]:null;}
function clientById(id){return S.clients.find(c=>c.id===id)||null;}
function visitsOf(id){return S.visits.filter(v=>v.clientId===id).sort((a,b)=>(b.date||"").localeCompare(a.date||""));}
function lastVisit(id){const v=visitsOf(id);return v[0]||null;}
function apptsOn(d){return S.appts.filter(a=>a.date===d).sort((a,b)=>a.sort-b.sort);}
async function photoURL(id){if(S.photoURLs.has(id))return S.photoURLs.get(id);

/* ---------------- Earnings ---------------- */
function viewMoney(){
  const from=S.mFrom<=S.mTo?S.mFrom:S.mTo,to=S.mFrom<=S.mTo?S.mTo:S.mFrom;
  const vs=S.visits.filter(v=>v.date>=from&&v.date<=to)
    .sort((a,b)=>b.date.localeCompare(a.date));
  let collected=0,discounts=0,priced=0;
  for(const v of vs){const paid=paidAmount(v);
    if(paid!=null){collected+=paid;discounts+=(+v.price)-paid;priced++;}}
  collected=Math.round(collected*100)/100;discounts=Math.round(discounts*100)/100;
  const chips=[["today","Today"],["7d","Last 7 days"],["month","This month"]].map(([k,l])=>
    `<button class="chip ${S.mPreset===k?"on":""}" data-act="m-preset" data-id="${k}">${l}</button>`).join("");
  const rows=vs.map(v=>{const c=clientById(v.clientId);const paid=paidAmount(v);
    return`<div class="card tap visit" data-act="open-client" data-id="${c?c.id:""}">
      <div class="vhead"><span class="vdate">${esc(fmtDate(v.date))}</span>
        <span style="font-weight:700">${esc(c?c.name:"?")}</span>
        ${v.discountPct?`<span class="badge b-line">-${v.discountPct}%</span>`:""}
        <span class="vprice">${paid==null?"—":v.discountPct?`<s style="color:var(--muted);font-weight:400">${esc(fmtMoney(v.price))}</s> ${esc(fmtMoney(paid))}`:esc(fmtMoney(paid))}</span></div>
      ${v.services?`<div class="vsvc" style="font-size:13px;color:var(--muted)">${esc(v.services)}</div>`:""}</div>`;}).join("");
  return`<div class="topbar"><h1>Earnings</h1></div><main>
  <div class="chips">${chips}</div>
  <div class="kv" style="margin-bottom:12px">
    <input id="m-from" type="date" value="${esc(from)}"><input id="m-to" type="date" value="${esc(to)}"></div>
  <div class="stats">
    <div class="stat"><div class="n">${vs.length}</div><div class="l">Visits</div></div>
    <div class="stat"><div class="n">${esc(fmtMoney(collected))}</div><div class="l">Collected</div></div>
    <div class="stat"><div class="n">${esc(fmtMoney(discounts))}</div><div class="l">Discounts given</div></div>
  </div>
  ${priced<vs.length?`<div class="hint" style="margin-bottom:10px">${vs.length-priced} visit${vs.length-priced>1?"s":""} in this period ha${vs.length-priced>1?"ve":"s"} no price entered — not counted.</div>`:""}
  ${rows||`<div class="empty"><div class="big">💰</div>No visits in this period.</div>`}</main>`;}

function shrinkImage(file){return new Promise((res,rej)=>{
  const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{const MAX=1280;let{width:w,height:h}=img;
    if(w>MAX||h>MAX){const k=MAX/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    cv.toBlob(b=>{URL.revokeObjectURL(url);b?res(b):rej(new Error("encode failed"));},"image/jpeg",.82);};
  img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("bad image"));};
  img.src=url;});}

    ${!S.editApptIsNew&&a.status!=="done"&&a.status!=="cancelled"?`<div class="btnrow" style="margin-bottom:0"><button class="btn sec wide" data-act="close-appt-btn" data-id="${esc(a.id)}" style="color:var(--good)">✓ Close appointment — log her visit & payment</button></div>`:""}

/* ---------------- sheet sync ---------------- */
function sheetIdOf(url){const m=String(url||"").match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:null;}
function sheetGidOf(url){const m=String(url||"").match(/[#?&]gid=(\d+)/);return m?m[1]:null;}
async function syncFetch(){
  const id=sheetIdOf(SET.sheetUrl);
  if(!id){toast("Add your Google Sheet link in Settings first");S.view="settings";render();return;}
  toast("Fetching schedule…");
  const gid=sheetGidOf(SET.sheetUrl);
  const tab=(SET.sheetTab||"").trim();
  const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv${tab?`&sheet=${encodeURIComponent(tab)}`:gid?`&gid=${gid}`:""}`;
  try{const r=await fetch(url);
    if(!r.ok)throw new Error("HTTP "+r.status);
    const text=await r.text();
    if(/^\s*</.test(text))throw new Error("not shared");
    beginImport(parseDSV(text));
  }catch(e){openImport(true);}}
function openImport(fetchFailed){$("#ov-import-in").innerHTML=`
  <div class="ovbar"><button class="iconbtn" data-act="close-import">‹</button><h2>Import schedule</h2></div>
  ${fetchFailed?`<div class="note">Couldn't reach Google from here (this page can't call other websites, or the sheet isn't link-shared). <b>Paste import works everywhere:</b></div>`:""}
  <div class="card">
    <b>From the Google Sheets app:</b>
    <div class="hint" style="margin-bottom:8px">1. Open the schedule — the <b>${esc(SET.sheetTab||"schedule")}</b> tab<br>2. Select the cells — <b>include the header row</b> (Name, Date, Time, Service…)<br>3. Copy, come back here, and paste below</div>
    <textarea id="paste-box" style="min-height:120px" placeholder="Paste the copied schedule here…"></textarea>
    <div class="btnrow"><button class="btn" data-act="paste-go">Import pasted rows</button></div>
    <b>Or a CSV file</b> <span class="hint">(File → Download → CSV on a computer)</span>
    <div class="btnrow" style="margin-bottom:0"><button class="btn sec wide" data-act="csv-pick">Choose CSV file</button></div>
    <input type="file" id="file-csv" accept=".csv,.tsv,.txt,text/csv" hidden>
  </div>`;
  $("#ov-import").classList.add("open");window.scrollTo(0,0);}
function beginImport(rows){
  if(!rows||rows.length<1){toast("Nothing to import");return;}
  S.importRows=rows;
  const width=Math.max(...rows.map(r=>r.length));
  const m=SET.mapping;
  if(m&&m.width===width&&m.name<width&&m.date<width){doImport();return;}
  openMap();}
function guessCol(headers,res){const H=headers.map(h=>String(h).toLowerCase());
  const find=re=>H.findIndex(h=>re.test(h));
  return{name:find(/name|client|customer|اسم/)>=0?find(/name|client|customer|اسم/):0,
    date:find(/date|day|تاريخ/),time:find(/time|hour|وقت|ساعة/),
    service:find(/service|treat|خدمة/),artist:find(/artist|staff|tech|emp|by|nail/),
    confirm:find(/confirm|status|تأكيد/)};}
function openMap(){const rows=S.importRows;const headers=rows[0];
  const width=Math.max(...rows.map(r=>r.length));
  const g={...guessCol(headers),...(SET.mapping&&SET.mapping.width===width?SET.mapping:{})};
  const opts=sel=>{let o=`<option value="-1">— none —</option>`;
    for(let i=0;i<width;i++){const h=String(headers[i]??"").trim()||`Column ${i+1}`;
      const eg=String((rows[1]||[])[i]??"").trim();
      o+=`<option value="${i}" ${sel===i?"selected":""}>${esc(h)}${eg?` (e.g. ${esc(eg.slice(0,18))})`:""}</option>`;}
    return o;};
  const row=(lab,id,sel,req)=>`<tr><td>${lab}${req?" *":""}</td><td><select id="map-${id}">${opts(sel)}</select></td></tr>`;
  $("#ov-map-in").innerHTML=`
  <div class="ovbar"><button class="iconbtn" data-act="close-map">‹</button><h2>Which column is which?</h2></div>
  <div class="card">
    <div class="hint" style="margin-bottom:8px">Found ${rows.length} rows. Tell NailBook once — it remembers for next time.</div>
    <table class="map">
      ${row("Client name","name",g.name,true)}
      ${row("Date","date",g.date,true)}
      ${row("Time","time",g.time)}
      ${row("Service","service",g.service)}
      ${row("Nail artist","artist",g.artist)}
      ${row("Confirmed","confirm",g.confirm)}
    </table>
    <div class="switch" style="border:0"><div class="lab">First row is headers</div>
      <button class="sw ${SET.mapping&&SET.mapping.hasHeader===false?"":"on"}" id="map-header" data-act="tgl-sw"></button></div>
    <div class="btnrow" style="margin-bottom:0"><button class="btn wide" data-act="map-go">Import</button></div>
  </div>`;
  $("#ov-map").classList.add("open");window.scrollTo(0,0);}
async function doImport(){
  const rows=S.importRows;const m=SET.mapping;
  const data=m.hasHeader?rows.slice(1):rows;
  const get=(r,i)=>i>=0?String(r[i]??"").trim():"";
  const artistFilter=nameKey(SET.artist);
  let ok=0,skipped=0,unknown=new Set();
  const fresh=[];
  for(const r of data){
    const name=get(r,m.name);const dateRaw=get(r,m.date);
    if(!name||!dateRaw){skipped++;continue;}
    const date=parseDateStr(dateRaw,SET.dayFirst);
    if(!date){skipped++;continue;}
    if(artistFilter&&m.artist>=0){const a=nameKey(get(r,m.artist));
      if(a&&!a.includes(artistFilter)&&!artistFilter.includes(a)){continue;}}
    const t=parseTime(get(r,m.time));
    const conf=get(r,m.confirm);const cl=conf.toLowerCase();
    const cancelled=/cancel|كنسل|ملغ/.test(cl);
    const confirmed=!!conf&&!cancelled&&!/^(no|n|pending|tbd|-|\?)$/.test(cl);
    const key=nameKey(name);
    fresh.push({id:`sh|${date}|${t.disp}|${key}`,src:"sheet",date,time:t.disp,sort:t.sort,
      name,key,service:get(r,m.service),confirmed,status:cancelled?"cancelled":"",});
    if(!clientByKey(key))unknown.add(key);
    ok++;}
  const prevAppts=S.appts.map(a=>({...a}));
  SET.hiddenAppts=(SET.hiddenAppts||[]).filter(h=>h.slice(0,10)>=addDaysISO(todayISO(),-30));saveSet();
  const hidden=new Set(SET.hiddenAppts);
  const manual=S.appts.filter(a=>a.src==="manual");
  const manualDK=new Set(manual.map(a=>a.date+"|"+a.key));
  const kept=fresh.filter(a=>!hidden.has(a.date+"|"+a.key)&&!manualDK.has(a.date+"|"+a.key));
  ok=kept.length;
  await dbClearStore("appts");
  const seen=new Set();
  for(const a of[...kept,...manual]){if(seen.has(a.id))continue;seen.add(a.id);await dbPut("appts",a);}
  S.appts=[...kept,...manual.filter(a=>!kept.some(k=>k.id===a.id))];
  await logAdd(`Imported ${ok} appointments from the sheet`,{kind:"appts-replace",appts:prevAppts});
  const now=new Date();
  SET.lastSync=`${fmtDate(todayISO())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;saveSet();
  S.importRows=null;
  $("#ov-map").classList.remove("open");$("#ov-import").classList.remove("open");
  S.view="today";render();
  toast(`Imported ${ok} appointment${ok!==1?"s":""}${unknown.size?` · ${unknown.size} new client${unknown.size!==1?"s":""}`:""}${skipped?` · ${skipped} rows skipped`:""}`);}

/* ---------------- backup ---------------- */
function blobToDataURL(b){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b);});}
function dataURLToBlob(u){const[h,b64]=u.split(",");const mime=(h.match(/data:(.*?);/)||[])[1]||"image/jpeg";
  const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);
  return new Blob([a],{type:mime});}
async function exportBackup(){
  toast("Preparing backup…");
  const photos=[];
  for(const p of await dbAll("photos"))photos.push({id:p.id,dataUrl:await blobToDataURL(p.blob)});
  const payload=JSON.stringify({app:"nailbook",version:1,exportedAt:new Date().toISOString(),
    settings:SET,clients:S.clients,visits:S.visits,appts:S.appts,photos});
  const fname=`nailbook-backup-${todayISO()}.json`;
  if(window.claude&&window.claude.downloads){
    try{await window.claude.downloads.save({filename:fname,data:payload});toast("Backup saved ✓");return;}
    catch(e){if(e&&e.code==="declined"){toast("Backup cancelled");return;}
      if(e&&e.code==="rate_limited"){toast("Try again in a moment");return;}}}
  try{const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([payload],{type:"application/json"}));
    a.download=fname;document.body.appendChild(a);a.click();a.remove();toast("Backup downloaded ✓");}
  catch(e){toast("Couldn't save the backup here");}}
async function restoreBackup(file){
  let j;try{j=JSON.parse(await file.text());}catch(e){toast("That file isn't a NailBook backup");return;}
  if(!j||j.app!=="nailbook"||!Array.isArray(j.clients)){toast("That file isn't a NailBook backup");return;}
  if(!confirm(`Replace everything on this device with the backup from ${j.exportedAt?j.exportedAt.slice(0,10):"?"}?\n(${j.clients.length} clients, ${(j.visits||[]).length} visits)`))return;
  for(const st of["clients","visits","photos","appts"])await dbClearStore(st);
  for(const u of S.photoURLs.values())URL.revokeObjectURL(u);S.photoURLs.clear();
  for(const c of j.clients)await dbPut("clients",c);
  for(const v of j.visits||[])await dbPut("visits",v);
  for(const a of j.appts||[])await dbPut("appts",a);
  for(const p of j.photos||[])await dbPut("photos",{id:p.id,blob:dataURLToBlob(p.dataUrl)});
  if(j.settings){SET={...DEF_SET,...j.settings};saveSet();}
  await loadAll();render();toast("Backup restored ✓");}

      v.discountPct=+($("#v-disc").value||0)||0;v.notes=$("#v-notes").value.trim();
      await dbPut("visits",v);
      const i=S.visits.findIndex(x=>x.id===v.id);if(i>=0)S.visits[i]=v;else S.visits.push(v);
      const c=clientById(v.clientId);let booked=false;
      if(c){c.nextRequest=$("#v-next").value.trim();
        await dbPut("clients",c);
        const bd=$("#v-bkdate").value;
        if(bd){const bt=parseTime($("#v-bktime").value);
          const na={id:"man|"+uid(),src:"manual",date:bd,time:bt.disp,sort:bt.sort,
            name:c.name,key:c.key,service:c.nextRequest||"",dur:60,confirmed:false,status:""};
          await dbPut("appts",na);S.appts.push(na);booked=true;v._bookedApptId=na.id;}}
      let closeInfo=null;
      if(S.closingApptId){const ap=S.appts.find(x=>x.id===S.closingApptId);
        if(ap&&ap.status!=="done")closeInfo={id:ap.id,prevStatus:ap.status,prevSrc:ap.src};}
      if(ev.isNew)await logAdd(`Added visit — ${c?c.name:""} (${fmtDate(v.date)})`,
        {kind:"visit-delete",id:v.id,photoIds:[...(v.photoIds||[])],apptId:v._bookedApptId,closeAppt:closeInfo});
      else if(prevV)await logAdd(`Edited visit — ${c?c.name:""} (${fmtDate(v.date)})`,
        {kind:"visit-restore",visit:{...prevV,photoIds:[...(prevV.photoIds||[])]}});
      if(closeInfo){const ap=S.appts.find(x=>x.id===closeInfo.id);
        ap.status="done";ap.src="manual";await dbPut("appts",ap);}
      S.closingApptId=null;
      delete v._bookedApptId;
      ev.newPhotoIds=[];await closeVisit(false);render();
      toast(booked?`Visit saved + next appointment booked ✓`:"Visit saved ✓");
      if(ev.isNew&&c&&paidAmount(v)!=null){
        if(c.phone)askConfirm(`Send ${c.name.split(" ")[0]} her receipt on WhatsApp?`,
          async()=>{openWA(waLink(c.phone,receiptText(v,c)));});
        else setTimeout(()=>toast("No phone saved — add it on her card to send receipts"),2400);}
      break;}
    case"del-visit":{const ev=S.editVisit;if(!ev||ev.isNew)break;
      if(!confirm("Delete this visit?"))break;
      {const c=clientById(ev.v.clientId);const savedPh=[];
      for(const p of ev.v.photoIds||[]){const ph=await dbGet("photos",p);if(ph)savedPh.push(ph);}
      await logAdd(`Deleted visit — ${c?c.name:""} (${fmtDate(ev.v.date)})`,
        {kind:"visit-full-restore",visit:{...ev.v,photoIds:[...(ev.v.photoIds||[])]},photos:savedPh});}
      for(const p of ev.v.photoIds||[])await dbDel("photos",p);
      await dbDel("visits",ev.v.id);S.visits=S.visits.filter(x=>x.id!==ev.v.id);
      ev.newPhotoIds=[];await closeVisit(false);render();toast("Visit deleted");break;}
    case"ph-add":$("#file-photo").click();break;
    case"ph-del":{const ev=S.editVisit;if(!ev)break;
      ev.v.photoIds=ev.v.photoIds.filter(p=>p!==id);
      if(ev.newPhotoIds.includes(id)){await dbDel("photos",id);ev.newPhotoIds=ev.newPhotoIds.filter(p=>p!==id);}
      renderVisit();break;}
    case"pv-open":{e.stopPropagation();const u=await photoURL(id);
      if(u){$("#pv-img").src=u;$("#photoview").classList.add("open");}break;}
    case"pv-close":$("#photoview").classList.remove("open");break;
    case"remind-done":{const c=clientById(id);if(!c)break;
      await logAdd(`Follow-up done — ${c.name}`,{kind:"client-restore",client:{...c}});
      c.reminderDate="";c.reminderNote="";await dbPut("clients",c);render();toast("Follow-up done ✓");break;}
    case"remind-snooze":{const c=clientById(id);if(!c)break;
      await logAdd(`Snoozed follow-up — ${c.name}`,{kind:"client-restore",client:{...c}});
      c.reminderDate=addDaysISO(c.reminderDate<todayISO()?todayISO():c.reminderDate,7);
      await dbPut("clients",c);render();toast("Snoozed a week");break;}
    case"undo":{const e=S.log.find(x=>x.id===id);if(!e)break;
      if(!confirm(`Undo this change?\n\n${e.label}`))break;
      await doUndo(id);break;}
    case"save-settings":{
      SET.sheetUrl=$("#set-sheet").value.trim();SET.sheetTab=$("#set-tab").value.trim();
      SET.artist=$("#set-artist").value.trim();
      SET.currency=$("#set-cur").value.trim();SET.waCC=$("#set-cc").value.replace(/\D/g,"");
      SET.salonName=$("#set-salon").value.trim();
      SET.dayFirst=$("#set-df").value==="1";
      SET.msgConfirm=$("#set-m1").value;SET.msgComeback=$("#set-m2").value;
      SET.servicesTxt=$("#set-services").value;
      saveSet();toast("Settings saved ✓");break;}
    case"export":{
      if($("#set-sheet")){SET.sheetUrl=$("#set-sheet").value.trim();saveSet();}
      await exportBackup();break;}
    case"import-backup":$("#file-restore").click();break;
    case"wipe":{if(!confirm("Delete ALL clients, visits, photos and appointments from this device?"))break;
      if(!confirm("Really sure? There is no undo. (Export a backup first!)"))break;
      for(const st of["clients","visits","photos","appts"])await dbClearStore(st);
      for(const u of S.photoURLs.values())URL.revokeObjectURL(u);S.photoURLs.clear();
      localStorage.removeItem("nailbook.settings");SET={...DEF_SET};
      await loadAll();render();toast("All data deleted");break;}
  }});

document.addEventListener("change",async e=>{
  const t=e.target;
  if(t.id==="m-from"||t.id==="m-to"){
    if(t.id==="m-from")S.mFrom=t.value||S.mFrom;else S.mTo=t.value||S.mTo;
    S.mPreset="";render();}
  if(t.id==="file-csv"&&t.files[0]){beginImport(parseDSV(await t.files[0].text()));t.value="";}
  if(t.id==="file-restore"&&t.files[0]){await restoreBackup(t.files[0]);t.value="";}
  if(t.id==="file-photo"&&t.files.length){
    const ev=S.editVisit;if(!ev)return;
    toast("Adding photo…");
    for(const f of[...t.files]){
      try{const blob=await shrinkImage(f);const id=uid();
        await dbPut("photos",{id,blob});ev.v.photoIds.push(id);ev.newPhotoIds.push(id);}
      catch(err){toast("Couldn't read that photo");}}
    t.value="";renderVisit();}});

/* ---------------- boot ---------------- */
if("serviceWorker" in navigator&&location.protocol==="https:")
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
(async function(){await loadAll();render();})();
</script>
